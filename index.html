<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Gym Tracker v9.6 - Cloud & Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#09090b', card: '#18181b', border: '#27272a' },
                        accent: { DEFAULT: '#00e5ff', hover: '#00cc6a' },
                    },
                    borderRadius: { 'xl': '12px' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .input-field { @apply w-full bg-dark-bg border border-dark-border rounded-lg text-white p-4 text-xl text-center outline-none transition focus:border-accent; }
            .rpe-btn { @apply flex-1 p-3 bg-dark-bg border border-dark-border rounded-lg text-white cursor-pointer text-lg text-center transition; }
            .rpe-btn.active { @apply bg-accent text-black font-bold border-accent; }
            .btn-primary { @apply w-full p-4 bg-accent text-black rounded-xl font-bold text-lg transition hover:bg-accent-hover hover:-translate-y-0.5 active:translate-y-0.5 shadow-[0_0_15px_rgba(0,229,255,0.2)]; }
            .btn-outline { @apply w-full p-4 bg-transparent border border-dark-border text-white rounded-xl font-bold text-lg transition hover:border-accent hover:text-accent; }
            .btn-ghost { @apply w-full p-3 bg-transparent text-slate-400 rounded-xl font-bold text-sm transition hover:text-white hover:bg-slate-800; }
            .btn-danger { @apply w-full p-4 bg-transparent border border-red-900 text-red-500 rounded-xl font-bold text-lg mt-3 transition hover:bg-red-950; }
            .tab-btn { @apply flex-1 py-3 text-sm font-bold rounded-lg border border-dark-border text-slate-400 transition bg-dark-bg; }
            .tab-btn.active { @apply bg-accent text-black border-accent shadow-[0_0_10px_rgba(0,229,255,0.3)]; }
        }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="bg-dark-bg text-white antialiased flex justify-center min-h-screen p-5 pb-20">

<div id="app" class="w-full max-w-[420px] relative">

    <div id="view-summary" class="view space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-extrabold text-accent">Beendet!</h1>
            <p class="text-slate-400">Starke Leistung heute.</p>
        </header>
        
        <div class="bg-dark-card border border-dark-border rounded-xl p-6 shadow-xl space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-dark-bg p-4 rounded-lg border border-dark-border text-center">
                    <div class="stat-value" id="ui-summary-tonnage">0 kg</div>
                    <div class="stat-label">Volumen</div>
                </div>
                <div class="bg-dark-bg p-4 rounded-lg border border-dark-border text-center">
                    <div class="stat-value" id="ui-summary-avg-rpe">0</div>
                    <div class="stat-label">Ø RPE</div>
                </div>
            </div>

            <div class="border-t border-dark-border pt-4">
                <label class="block text-sm font-bold text-slate-400 mb-3 uppercase tracking-widest">Pump-Check (Optional)</label>
                <input type="file" id="input-photo" accept="image/*" class="hidden" onchange="app.handlePhotoUpload(event)">
                <button onclick="document.getElementById('input-photo').click()" class="btn-outline border-dashed text-sm py-3 flex items-center justify-center gap-2">
                    📸 Foto hinzufügen
                </button>
                <div id="photo-preview" class="mt-3 hidden">
                    <img src="" id="ui-photo-img" class="rounded-lg w-full h-48 object-cover border border-dark-border">
                    <p class="text-xs text-accent mt-1">Bild bereit zum Upload!</p>
                </div>
            </div>

            <button class="btn-primary mt-4" id="btn-save-final" onclick="app.finishAndSave()">In MongoDB speichern ✅</button>
        </div>
    </div>

    </div>

<script>
// --- CLOUDINARY KONFIGURATION ---
const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dqzwiu3jw/image/upload";
const CLOUDINARY_PRESET = "gym_preset"; // Das "Unsigned" Preset

const API_URL = 'https://gym-backend-qgbf.onrender.com/api'; 

const DB_SCHEMA = {
    A: [ { id: "a1", name: "Schulterpresse", sets: 3, reps: "8-10", rest: 90 }, { id: "a2", name: "Kabel Brust Low", sets: 3, reps: "10-12", rest: 90 }, { id: "a3", name: "Kabel Brust High", sets: 3, reps: "10-12", rest: 90 }, { id: "a4", name: "Seitheben Kabel", sets: 3, reps: "12-15", rest: 60 }, { id: "a5", name: "Trizeps Kabel", sets: 3, reps: "10-12", rest: 60 } ],
    B: [ { id: "b1", name: "Face Pulls", sets: 3, reps: "12-15", rest: 60 }, { id: "b2", name: "Rudern eng", sets: 3, reps: "8-10", rest: 90 }, { id: "b3", name: "Latzug breit", sets: 3, reps: "8-10", rest: 90 }, { id: "b4", name: "Bizepscurls", sets: 3, reps: "10-12", rest: 60 } ],
    Legs: [ { id: "l1", name: "Beinpresse", sets: 3, reps: "8-10", rest: 120 }, { id: "l2", name: "Beinbeuger", sets: 3, reps: "10-12", rest: 90 }, { id: "l3", name: "Wadenheben", sets: 3, reps: "15-20", rest: 60 } ]
};

const app = {
    state: { 
        planId: null, plan: [], currentExIdx: 0, currentSet: 1, 
        logs: [], selectedRPE: 8, tonnage: 0, timerInt: null, 
        timeLeft: 0, totalRest: 0, currentImageUrl: "" 
    },
    analyticsCharts: [],

    async init() {
        // ... (init bleibt gleich)
        this.renderBodyChart();
        document.getElementById('rpe-selectors')?.addEventListener('click', (e) => {
            const btn = e.target.closest('.rpe-btn');
            if (btn) {
                document.querySelectorAll('.rpe-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.state.selectedRPE = parseInt(btn.dataset.rpe);
            }
        });
    },

    switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    },

    // --- NEU: ABBRECHEN FIX ---
    abortWorkout() {
        if(confirm("Workout abbrechen? Daten gehen verloren.")) {
            if (this.state.timerInt) clearInterval(this.state.timerInt);
            this.state.logs = [];
            this.state.currentImageUrl = "";
            this.goHome();
        }
    },

    // --- NEU: CLOUDINARY HANDLER ---
    async handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Preview zeigen
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('photo-preview').classList.remove('hidden');
            document.getElementById('ui-photo-img').src = e.target.result;
        };
        reader.readAsDataURL(file);

        // Upload zu Cloudinary
        const btnSave = document.getElementById('btn-save-final');
        btnSave.disabled = true;
        btnSave.innerText = "Bild wird hochgeladen...";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_PRESET);

        try {
            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
            const data = await res.json();
            this.state.currentImageUrl = data.secure_url;
            btnSave.disabled = false;
            btnSave.innerText = "In MongoDB speichern ✅";
            console.log("Bild-URL:", data.secure_url);
        } catch (e) {
            alert("Upload fehlgeschlagen!");
            btnSave.disabled = false;
            btnSave.innerText = "In MongoDB speichern ✅";
        }
    },

    // --- NEU: LÖSCH-FUNKTION ---
    async deleteWorkout(id, planId) {
        if(!confirm("Dieses Workout wirklich löschen?")) return;
        try {
            const res = await fetch(`${API_URL}/workouts/${id}`, { method: 'DELETE' });
            if(res.ok) this.renderAnalyticsTab(planId);
        } catch (e) { alert("Fehler beim Löschen"); }
    },

    async finishAndSave() {
        const payload = { 
            planId: this.state.planId, 
            totalVolume: this.state.tonnage, 
            logs: this.state.logs,
            imageUrl: this.state.currentImageUrl // Foto Link mitsenden!
        };
        try {
            await fetch(`${API_URL}/workouts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            this.state.currentImageUrl = ""; // Reset
            this.goHome();
        } catch (e) { alert("Server nicht erreichbar!"); }
    },

    async renderAnalyticsTab(planId) {
        // ... (Tab UI Logik wie vorher)
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-btn-${planId}`).classList.add('active');
        this.analyticsCharts.forEach(c => c.destroy());
        this.analyticsCharts = [];

        let history = [];
        try {
            const res = await fetch(`${API_URL}/workouts`);
            history = await res.json();
        } catch (e) {}

        const tabHistory = history.filter(h => h.planId === planId).sort((a,b) => new Date(a.date) - new Date(b.date));
        const container = document.getElementById('analytics-content');
        container.innerHTML = '';

        if (tabHistory.length === 0) {
            container.innerHTML = '<p class="text-center py-10">Keine Daten.</p>';
            return;
        }

        DB_SCHEMA[planId].forEach((ex) => {
            let chartLabels = [], chartData = [], tableRowsHTML = '';
            
            [...tabHistory].reverse().forEach(session => {
                const exLogs = session.logs.filter(l => l.exId === ex.id);
                if (exLogs.length > 0) {
                    const dateStr = new Date(session.date).toLocaleDateString('de-DE');
                    
                    // NEU: Lösch Button und Foto in der Liste
                    const imgHtml = session.imageUrl ? `<img src="${session.imageUrl}" class="w-10 h-10 object-cover rounded mt-1 border border-accent">` : '';
                    
                    tableRowsHTML += `
                        <div class="py-3 border-b border-dark-border relative">
                            <button onclick="app.deleteWorkout('${session._id}', '${planId}')" class="absolute right-0 top-3 text-red-900 text-xs">Löschen 🗑️</button>
                            <p class="text-accent text-xs font-bold">${dateStr}</p>
                            <div class="flex items-center gap-3">
                                <div class="flex-1 flex flex-wrap gap-1 mt-1">
                                    ${exLogs.map(l => `<span class="bg-dark-bg p-1 rounded text-[10px] border border-dark-border">${l.weight}kg x ${l.reps}</span>`).join('')}
                                </div>
                                ${imgHtml}
                            </div>
                        </div>`;
                    
                    chartLabels.push(dateStr); 
                    chartData.push(Math.max(...exLogs.map(l => l.weight)));
                }
            });

            // ... (Chart Rendering bleibt gleich)
            if (chartData.length > 0) {
                const canvasId = `chart-${ex.id}`;
                container.innerHTML += `<div class="bg-dark-card border border-dark-border rounded-xl p-4"><h3>${ex.name}</h3><div class="h-32 w-full my-4"><canvas id="${canvasId}"></canvas></div><div class="max-h-48 overflow-y-auto custom-scrollbar">${tableRowsHTML}</div></div>`;
                setTimeout(() => {
                    const ctx = document.getElementById(canvasId).getContext('2d');
                    this.analyticsCharts.push(new Chart(ctx, {
                        type: 'line',
                        data: { labels: chartLabels.reverse(), datasets: [{ label: 'kg', data: chartData.reverse(), borderColor: '#00e5ff', tension: 0.3 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    }));
                }, 0);
            }
        });
    },

    // ... (restliche Funktionen: saveBodyData, renderBodyChart etc.)
    goHome() { this.switchView('view-dashboard'); this.renderBodyChart(); },
    initWarmup(id) { this.state.planId = id; this.switchView('view-warmup'); },
    startWorkout() {
        this.state = { ...this.state, plan: DB_SCHEMA[this.state.planId], currentExIdx: 0, currentSet: 1, logs: [], tonnage: 0, currentImageUrl: "" };
        this.switchView('view-workout');
        this.renderExercise();
    },
    // ... (saveSet, renderExercise etc. wie gehabt)
    saveSet() {
        const w = document.getElementById('input-weight').value, r = document.getElementById('input-reps').value;
        if (!w || !r) return; 
        const ex = this.state.plan[this.state.currentExIdx], vol = parseFloat(w) * parseInt(r);
        this.state.tonnage += vol;
        this.state.logs.push({ exId: ex.id, exerciseName: ex.name, set: this.state.currentSet, weight: parseFloat(w), reps: parseInt(r), rpe: this.state.selectedRPE, volume: vol });
        this.startTimer(ex.rest);
    },
    startTimer(seconds) {
        document.getElementById('input-section').classList.add('hidden'); document.getElementById('timer-section').classList.remove('hidden');
        this.state.totalRest = seconds; this.state.timeLeft = seconds;
        this.state.timerInt = setInterval(() => { this.state.timeLeft--; this.updateTimerUI(); if (this.state.timeLeft <= 0) this.skipTimer(); }, 1000);
    },
    updateTimerUI() { 
        document.getElementById('ui-timer').innerText = this.state.timeLeft; 
        document.getElementById('ui-progress').style.width = `${(this.state.timeLeft / this.state.totalRest) * 100}%`; 
    },
    skipTimer() { clearInterval(this.state.timerInt); this.skipSet(); },
    skipSet() { 
        const ex = this.state.plan[this.state.currentExIdx]; 
        if (this.state.currentSet < ex.sets) { this.state.currentSet++; this.renderExercise(); } 
        else { this.state.currentSet = 1; this.state.currentExIdx++; this.renderExercise(); } 
    },
    async renderExercise() {
        if (this.state.currentExIdx >= this.state.plan.length) { this.showSummary(); return; }
        const ex = this.state.plan[this.state.currentExIdx];
        document.getElementById('ui-ex-name').innerText = ex.name;
        document.getElementById('ui-set').innerText = `${this.state.currentSet} / ${ex.sets}`;
        document.getElementById('ui-target').innerText = ex.reps;
        document.getElementById('ui-history-set-num').innerText = this.state.currentSet;
        document.querySelectorAll('#input-weight, #input-reps').forEach(i => i.value = '');
        document.getElementById('timer-section').classList.add('hidden');
        document.getElementById('input-section').classList.remove('hidden');
        await this.loadHistoryForCurrentSet(ex.id, this.state.currentSet);
        setTimeout(() => document.getElementById('input-weight').focus(), 100);
    },
    showSummary() {
        const avgRpe = this.state.logs.length > 0 ? (this.state.logs.reduce((s, satz) => s + satz.rpe, 0) / this.state.logs.length).toFixed(1) : 0;
        document.getElementById('ui-summary-tonnage').innerText = `${this.state.tonnage.toFixed(0)} kg`;
        document.getElementById('ui-summary-avg-rpe').innerText = avgRpe;
        document.getElementById('photo-preview').classList.add('hidden');
        this.switchView('view-summary');
    },
    async saveBodyData() {
        const w = document.getElementById('input-body-weight').value, waist = document.getElementById('input-body-waist').value;
        if (!w || !waist) return;
        try {
            await fetch(`${API_URL}/stats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ weight: parseFloat(w), waist: parseFloat(waist) })
            });
            this.renderBodyChart();
        } catch (e) {}
    },
    async renderBodyChart() {
        let history = [];
        try {
            const res = await fetch(`${API_URL}/stats`);
            history = await res.json();
        } catch (e) {}
        const ctx = document.getElementById('body-chart').getContext('2d');
        if(window.bodyChart) window.bodyChart.destroy();
        window.bodyChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: history.map(d=>new Date(d.date).toLocaleDateString('de-DE')), 
                datasets: [ { label: 'kg', data: history.map(d=>d.weight), borderColor: '#00e5ff', tension: 0.3 }, { label: 'cm', data: history.map(d=>d.waist), borderColor: '#94a3b8', yAxisID: 'yWaist' } ] 
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { yWaist: { position: 'right' } }, plugins: { legend: { display: false } } }
        });
    }
};

app.init();
</script>
</body>
</html>
